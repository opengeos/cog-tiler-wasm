<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>cog-tiler-wasm demo</title>
    <link
      href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css"
      rel="stylesheet"
    />
    <!-- Resolve the cog-tiler.js peer dependencies to a CDN for this no-build
         demo. In a bundled app these are normal npm peer dependencies. -->
    <script type="importmap">
      {
        "imports": {
          "whitebox-wasm": "https://esm.sh/whitebox-wasm@0.4.0",
          "proj4": "https://esm.sh/proj4@2.20.9",
          "geotiff": "https://esm.sh/geotiff@2.1.3",
          "geotiff-geokeys-to-proj4": "https://esm.sh/geotiff-geokeys-to-proj4@2024.4.13"
        }
      }
    </script>
    <style>
      html,
      body,
      #map {
        margin: 0;
        height: 100%;
      }
      #panel {
        position: absolute;
        z-index: 1;
        top: 10px;
        left: 10px;
        background: #fff;
        padding: 10px 12px;
        border-radius: 6px;
        font: 13px system-ui, sans-serif;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
        max-width: 320px;
      }
      #panel input {
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div id="panel">
      <strong>cog-tiler-wasm</strong> — serverless COG tiling<br />
      <small>COG URL (EPSG:3857, or any projected/4326 - warped on the fly):</small>
      <input id="url" value="https://data.source.coop/giswqs/opengeos/dem.tif" placeholder="https://.../cog-3857.tif" />
      <div style="margin: 4px 0">
        <small>or open a local COG:</small>
        <input id="file" type="file" accept=".tif,.tiff,image/tiff" style="width: auto" />
      </div>
      <div>
        rescale
        <input
          id="min"
          type="number"
          value="0"
          style="width: 70px"
        />–<input id="max" type="number" value="1600" style="width: 70px" />
        <select id="cmap">
          <option selected>terrain</option>
          <option>viridis</option>
          <option>magma</option>
          <option>gray</option>
        </select>
        <button id="load">Load</button>
      </div>
      <small id="status"></small>
    </div>
    <div id="map"></div>

    <script type="module">
      import maplibregl from "https://esm.sh/maplibre-gl@5.24.0";
      // All COG tiling/warping/palette logic lives in the reusable module so
      // downstream apps can import it directly instead of copying this page.
      // `?v=__BUILD__` is rewritten to the commit SHA on deploy for cache-busting.
      import { init, openCog, registerCogProtocol } from "./cog-tiler.js?v=__BUILD__";

      await init();

      const status = (m) => (document.getElementById("status").textContent = m);
      const num = (id, fallback) => {
        const v = Number(document.getElementById(id).value);
        return Number.isFinite(v) ? v : fallback;
      };
      const readRender = () => {
        let min = num("min", 0), max = num("max", 1);
        if (min >= max) max = min + 1; // avoid a zero/negative rescale range
        return { min, max, colormap: document.getElementById("cmap").value };
      };

      const map = new maplibregl.Map({
        container: "map",
        style: {
          version: 8,
          sources: {
            osm: {
              type: "raster",
              tiles: ["https://tile.openstreetmap.org/{z}/{x}/{y}.png"],
              tileSize: 256,
              attribution: "© OpenStreetMap",
            },
          },
          layers: [{ id: "osm", type: "raster", source: "osm" }],
        },
        center: [0, 0],
        zoom: 2,
      });

      // Zoom/rotate controls + a globe toggle (MapLibre 5) to test that COG
      // tiles render in 3D globe projection, not just flat Web Mercator.
      map.addControl(new maplibregl.NavigationControl({ visualizePitch: true }));
      map.addControl(new maplibregl.GlobeControl());

      let current = null;
      // The protocol resolves the active source + current render settings per tile.
      registerCogProtocol(maplibregl, "cog", () => ({
        source: current,
        render: readRender(),
      }));

      let cogVersion = 0;
      // `source` is a URL string or a File (local raster); defaults to the URL box.
      async function load(source) {
        const src = source ?? document.getElementById("url").value.trim();
        if (!src) return;
        status(`opening ${typeof src === "string" ? "COG" : src.name}…`);
        try {
          current = await openCog(src);
          status(
            `${current.crsLabel}, ${current.levels.length} levels` +
              (current.hasPalette ? " (palette)" : ""),
          );
          if (map.getLayer("cog")) map.removeLayer("cog");
          if (map.getSource("cog")) map.removeSource("cog");
          // Bump the tile-URL version so MapLibre refetches instead of serving
          // cached tiles from a previously loaded raster (same cog:// template).
          map.addSource("cog", {
            type: "raster",
            tiles: [`cog://{z}/{x}/{y}?v=${++cogVersion}`],
            tileSize: 256,
          });
          map.addLayer({ id: "cog", type: "raster", source: "cog" });
          // Zoom to the data: boundsLonLat = [minlon,minlat,maxlon,maxlat].
          const b = current.boundsLonLat;
          if (b && b.length === 4 && b.every(Number.isFinite)) {
            map.fitBounds([[b[0], b[1]], [b[2], b[3]]], { padding: 20, duration: 0 });
          }
        } catch (e) {
          status("error: " + e);
        }
      }

      document.getElementById("load").onclick = () => load();
      document.getElementById("file").onchange = (e) => {
        if (e.target.files[0]) load(e.target.files[0]);
      };
      // Auto-load the prefilled sample so the demo works on first visit.
      if (document.getElementById("url").value.trim()) {
        if (map.loaded()) load();
        else map.on("load", () => load());
      }
    </script>
  </body>
</html>
